# ===========================================
# CYNIC RENDER BLUEPRINT
# ===========================================
# Uses external shared infrastructure from ASDF-Web
# Region: Oregon (same region for low latency)
#
# "φ distrusts φ" - κυνικός
#
# NOTE: Database and Redis URLs must be set manually
# in Render dashboard from asdf-shared-db and asdf-shared-redis

services:
  # ===========================================
  # CYNIC MCP Server
  # ===========================================
  - type: web
    name: cynic-mcp
    runtime: docker
    dockerfilePath: packages/mcp/Dockerfile
    dockerContext: .
    region: oregon
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MCP_MODE
        value: http
      - key: PORT
        value: 3000
      # External shared infrastructure (set in Render dashboard)
      # Copy connection strings from ASDF-Web's asdf-shared-db and asdf-shared-redis
      - key: CYNIC_DATABASE_URL
        sync: false
      - key: CYNIC_REDIS_URL
        sync: false
      # Solana (disabled for now)
      - key: CYNIC_ENABLE_ANCHORING
        value: "false"
    autoDeploy: true

# ===========================================
# NO LOCAL DATABASE OR REDIS
# ===========================================
# CYNIC uses shared infrastructure from ASDF-Web:
# - PostgreSQL: asdf-shared-db (schema: cynic)
# - Redis: asdf-shared-redis (prefix: cynic:*)
#
# Set these in Render dashboard:
# - CYNIC_DATABASE_URL = connection string from asdf-shared-db
# - CYNIC_REDIS_URL = connection string from asdf-shared-redis
